name: "Frontend: Deploy to Vercel (production)"

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: team_2y9zoE3rh1umBlLgpRyeQ1iB
  VERCEL_PROJECT_ID: prj_BndEDPARYdxEthW2p4Pno2ADyVnU

jobs:
  deploy:
    name: Deploy eldonia-nex.com
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Verify Vercel token
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error title=Missing VERCEL_TOKEN::Create a classic token at https://vercel.com/account/tokens and add it as repository secret VERCEL_TOKEN. See docs/vercel-ci-setup.md"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to production (Vercel remote build)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN"

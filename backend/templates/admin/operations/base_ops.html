{% extends "admin/base_site.html" %}
{% load static %}

{% block extrastyle %}
  {{ block.super }}
  <link rel="stylesheet" href="{% static 'admin/css/eldonia-ops.css' %}">
{% endblock %}

{% block content %}
<div class="ops-settings-page">
  <nav class="ops-tabs" aria-label="設定メニュー">
    <a class="ops-tab{% if active_tab == 'hub' %} is-active{% endif %}" href="{% url 'admin:ops_settings_hub' %}">⚙️ 設定一覧</a>
    <a class="ops-tab{% if active_tab == 'plans' %} is-active{% endif %}" href="{% url 'admin:ops_subscription_plans' %}">💴 サブスク料金</a>
    <a class="ops-tab{% if active_tab == 'fees' %} is-active{% endif %}" href="{% url 'admin:ops_fee_settings' %}">💰 手数料</a>
    <a class="ops-tab{% if active_tab == 'plan_details' %} is-active{% endif %}" href="{% url 'admin:ops_plan_details' %}">📋 プラン詳細</a>
    <a class="ops-tab{% if active_tab == 'quest' %} is-active{% endif %}" href="{% url 'admin:ops_quest_settings' %}">⚔️ Quest</a>
    <a class="ops-tab" href="{% url 'admin:index' %}">🏠 ダッシュボード</a>
  </nav>

  {% block ops_content %}{% endblock %}
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>プレビュー — 確認メール（日本語）</title>
</head>
<body style="margin:0;padding:0;background:#000000;color:#e8d5a3;font-family:Georgia,'Times New Roman',Times,serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#000000;padding:40px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;">
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <p style="margin:0;font-size:11px;letter-spacing:0.35em;text-transform:uppercase;color:#c9a84c;">ELDONIA NEX</p>
              <p style="margin:8px 0 0;font-size:12px;color:#5c5340;font-style:italic;">A Fantasy Nexus for Creators</p>
            </td>
          </tr>
          <tr>
            <td style="background:#0c0c0c;border:1px solid rgba(201,168,76,0.28);border-radius:10px;padding:36px 32px;">
              <p style="margin:0 0 10px;font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:#9a8b6a;">YOUR JOURNEY BEGINS</p>
              <h1 style="margin:0 0 18px;font-size:24px;line-height:1.35;font-weight:600;color:#e8d5a3;">ネクサスへの扉が、<br />いま開かれようとしています</h1>
              <p style="margin:0 0 8px;line-height:1.75;font-size:15px;color:#9a8b6a;">クリエイター名 様</p>
              <p style="margin:0 0 16px;line-height:1.85;font-size:15px;color:#9a8b6a;">このたびは Eldonia Nex へのご登録、誠にありがとうございます。<br />作品を紡ぎ、ファンと出会い、共創の物語を育てる——<strong style="color:#e8d5a3;font-weight:600;">あなただけの冒険</strong>が、ここから始まります。</p>
              <p style="margin:0 0 28px;line-height:1.85;font-size:15px;color:#9a8b6a;">まずは下のボタンからメールアドレスをご確認ください。確認が完了すると、プラン選択と規約への同意を経て、ネクサスの世界へ正式にお進みいただけます。</p>
              <table role="presentation" cellspacing="0" cellpadding="0" style="margin:0 0 28px;">
                <tr>
                  <td style="border-radius:6px;background:linear-gradient(180deg,#c9a84c 0%,#8a6d1f 100%);">
                    <a href="#" style="display:inline-block;padding:14px 32px;font-size:15px;font-weight:bold;color:#000000;text-decoration:none;border-radius:6px;">冒険を始める（メールを確認する）</a>
                  </td>
                </tr>
              </table>
              <p style="margin:16px 0 0;font-size:13px;line-height:1.75;color:#9a8b6a;font-style:italic;">さあ、ネクサスでお会いしましょう。</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
